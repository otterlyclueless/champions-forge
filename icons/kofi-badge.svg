<svg xmlns="http://www.w3.org/2000/svg" width="260" height="40" viewBox="0 0 260 40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2229"/>
      <stop offset="100%" style="stop-color:#151820"/>
    </linearGradient>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="260" height="40" rx="8"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="260" height="40" rx="8" fill="url(#bg)"/>

  <!-- Left red pill -->
  <rect x="0" y="0" width="52" height="40" fill="url(#left)" clip-path="url(#clip)"/>

  <!-- Shine overlay -->
  <rect width="260" height="20" fill="url(#shine)" rx="8"/>

  <!-- Border -->
  <rect width="260" height="40" rx="8" fill="none" stroke="#ef4444" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Shield icon (simplified geometric) -->
  <g transform="translate(14, 8)">
    <path d="M12 0 L22 4 L22 14 C22 20 12 24 12 24 C12 24 2 20 2 14 L2 4 Z"
          fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" opacity="0.95"/>
    <circle cx="12" cy="12" r="3.5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Divider -->
  <line x1="52" y1="6" x2="52" y2="34" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Coffee cup emoji area -->
  <text x="66" y="26" font-family="Segoe UI Emoji,Apple Color Emoji,sans-serif" font-size="17">☕</text>

  <!-- Main text -->
  <text x="93" y="16" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="800" fill="#f5a623" letter-spacing="0.3">Ko-fi</text>
  <text x="93" y="29" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#e2e8f0" letter-spacing="0.2">Support Champions Forge</text>

  <!-- Subtle pulse animation on the red section -->
  <rect x="0" y="0" width="52" height="40" rx="0" fill="#ef4444" opacity="0" clip-path="url(#clip)">
    <animate attributeName="opacity" values="0;0.15;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
